version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_PATH=/app/data/gateway.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BOOTSTRAP_ADMIN_TOKEN=${BOOTSTRAP_ADMIN_TOKEN}
      - BOOTSTRAP_ADMIN_WORKSPACE_ID=${BOOTSTRAP_ADMIN_WORKSPACE_ID:-default}
    volumes:
      - gateway-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Server-side BFF → Fastify (runtime; preferred over NEXT_PUBLIC_* for Docker)
      - GATEWAY_INTERNAL_API_URL=http://api:4000
      # Optional: kept for compatibility / client bundles that read public env at build time
      - NEXT_PUBLIC_API_BASE_URL=http://api:4000
      # Must match API bootstrap admin — required for /api/gateway/* admin proxy
      - BOOTSTRAP_ADMIN_TOKEN=${BOOTSTRAP_ADMIN_TOKEN}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  gateway-data:
